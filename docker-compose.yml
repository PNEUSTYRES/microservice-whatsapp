name: microservice-whatsapp-dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "3060:3060"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    restart: unless-stopped
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules
    depends_on:
      - db
    command: sh -c "npm run prisma:migrate && npm run dev"

  db:
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
    volumes:
      - microservice-whatsapp-dev-postgresql:/var/lib/postgresql/data

  studio:
    build:
      context: .
    working_dir: /app
    command: "npm run prisma:studio"
    ports:
      - "5565:5555"
    volumes:
      - .:/app

volumes:
  microservice-whatsapp-dev-postgresql:
